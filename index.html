<script>
    const firebaseConfig = {
        projectId: "vive-quintay-spa",
        authDomain: "vive-quintay-spa.firebaseapp.com",
        storageBucket: "vive-quintay-spa.appspot.com",
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function lanzarFlash(elementoId) {
        const el = document.getElementById(elementoId);
        el.style.display = "flex";
        el.style.opacity = "1";
        setTimeout(() => {
            el.style.transition = "opacity 0.4s ease";
            el.style.opacity = "0";
            setTimeout(() => el.style.display = "none", 400);
        }, 1300);
    }

    function lanzarFlashBlacklist() {
        const el = document.getElementById("flash-blacklist");
        if (!el) return;
        el.style.display = "flex";
        el.style.opacity = "1";
        if ("vibrate" in navigator) navigator.vibrate([500, 200, 500]);
        setTimeout(() => {
            el.style.transition = "opacity 0.5s ease";
            el.style.opacity = "0";
            setTimeout(() => el.style.display = "none", 500);
        }, 2200);
    }

    async function verificarPatente() {
        const rawInput = document.getElementById("inputPatente").value.toUpperCase().trim();
        const patente = rawInput.replace(/-/g, "").replace(/\s+/g, "");
        const display = document.getElementById("display-resultado");
        const regContainer = document.getElementById("registro-container");
        const listaDiv = document.getElementById("lista-pendientes");

        listaDiv.innerHTML = "";
        display.innerHTML = "";
        regContainer.style.display = "none";

        if (!patente) {
            display.innerHTML = "<p style='color: #FFB300;'>Ingresa una patente</p>";
            return;
        }

        try {
            // 1. Lista Negra (prioridad máxima)
            const blacklistSnap = await db.collection("config").doc("blacklist").get();
            const blacklist = blacklistSnap.exists ? blacklistSnap.data().lista || [] : [];
            if (blacklist.includes(patente)) {
                lanzarFlashBlacklist();
                display.innerHTML = `
                    <div class="card-status card-blacklist">
                        <h1 style="color: #D32F2F;">PATENTE BLOQUEADA</h1>
                        <p style="color: #FFCDD2; font-size: 1.4rem;">
                            Nos reservamos el derecho de admisión conforme a la normativa vigente.<br>
                            <strong>Lo sentimos, pero no podemos permitir el ingreso en este momento.</strong><br><br>
                            Para más detalles consulte la guía de la 
                            <a href="https://www.bcn.cl/leyfacil/recurso/derecho-de-admision" 
                               style="color:#BBDEFB; text-decoration:underline;" target="_blank">Biblioteca del Congreso</a>.
                        </p>
                        <p style="color: #B0BEC5; font-size: 1.2rem; margin-top: 20px;">
                            Contacte a Administración para aclaraciones.
                        </p>
                    </div>`;
                return;
            }

            // 2. Frecuentes
            const frecuentesSnap = await db.collection("config").doc("frecuentes").get();
            const frecuentesLista = frecuentesSnap.exists ? frecuentesSnap.data().lista || [] : [];
            const esFrecuente = frecuentesLista.includes(patente);

            // 3. Activos
            const doc = await db.collection("activos").doc(patente).get();

            if (esFrecuente) {
                lanzarFlash("flash-frecuente");
                display.innerHTML = `
                    <div class="card-status card-frecuente">
                        <h1 style="color: #42A5F5;">FRECUENTE</h1>
                        <p class="subtitle">Tope $4.000</p>
                        <p class="detail">Patente: ${patente}</p>
                        <p class="detail">Ingreso: ${doc.exists ? (doc.data().hora || '--:--') : '--:--'}</p>
                    </div>`;
                if (!doc.exists) {
                    regContainer.style.display = "block";
                    document.getElementById("patenteNueva").value = patente;
                }
                return;
            }

            if (doc.exists) {
                const data = doc.data();
                const status = data.status ? data.status.toLowerCase() : "activo";
                if (status === "pagado" || status === "finalizado") {
                    lanzarFlash("flash-pagado");
                    display.innerHTML = `
                        <div class="card-status card-pagado">
                            <h1 style="color: #00C853;">PAGADO</h1>
                            <p class="detail">Patente: ${patente}</p>
                            <p class="detail">Hora Pago: ${data.hora_pago || '--:--'}</p>
                            <p style="color: #E8F5E9; font-weight: bold;">Puede salir del recinto.</p>
                        </div>`;
                } else {
                    lanzarFlash("flash-pendiente");
                    display.innerHTML = `
                        <div class="card-status card-pendiente">
                            <h1 style="color: #FF9800;">PENDIENTE</h1>
                            <p class="detail">Patente: ${patente}</p>
                            <p class="detail">Ingreso: ${data.hora || '--:--'}</p>
                            <p style="color: #FFF3E0; font-weight: bold;">Debe regularizar pago en la caja.</p>
                        </div>`;
                }
            } else {
                display.innerHTML = `
                    <div class="card-status card-pendiente">
                        <h1 style="color: #D32F2F;">NO REGISTRADO</h1>
                        <p class="detail">Patente: ${patente}</p>
                        <p class="detail">No hay registro activo para hoy.</p>
                    </div>`;
                regContainer.style.display = "block";
                document.getElementById("patenteNueva").value = patente;
            }
        } catch (e) {
            console.error("Error en verificarPatente:", e);
            display.innerHTML = `<p style='color: #D32F2F;'>Error de conexión. Revisa internet o Firebase.<br>Detalles: ${e.message}</p>`;
        }
    }

    // Resto de funciones (verTotalPendientes, seleccionarPatente, accionRegistrar, cargarPatentesCache, autocomplete) se mantienen iguales
    async function verTotalPendientes() {
        const listaDiv = document.getElementById("lista-pendientes");
        const display = document.getElementById("display-resultado");
        document.getElementById("registro-container").style.display = "none";
        display.innerHTML = "";
        listaDiv.innerHTML = "<p style='color: #00E0D0;'>Consultando patio...</p>";
        try {
            const snapshot = await db.collection("activos")
                .where("tipo", "==", "Ticket por Minuto")
                .where("status", "==", "Activo")
                .get();
            if (snapshot.empty) {
                listaDiv.innerHTML = "<p style='color: #FFB300; margin-top:20px;'>NO HAY PENDIENTES</p>";
                return;
            }
            let html = `<h3 style="color: #00E0D0; margin-bottom: 15px;">TOTAL PENDIENTES: ${snapshot.size}</h3>`;
            snapshot.forEach(doc => {
                const data = doc.data();
                html += `<div class="card-pendiente" onclick="seleccionarPatente('${doc.id}')">
                            <div style="text-align: left;"><span class="txt-patente-lista">${doc.id}</span><span class="txt-hora-lista">Ingreso: ${data.hora || '--:--'}</span></div>
                            <div class="badge-pendiente">PENDIENTE</div>
                         </div>`;
            });
            listaDiv.innerHTML = html;
            listaDiv.scrollIntoView({ behavior: 'smooth' });
        } catch (e) {
            listaDiv.innerHTML = "<p style='color: #D32F2F;'>Error al cargar lista.</p>";
        }
    }

    function seleccionarPatente(p) {
        document.getElementById("inputPatente").value = p;
        window.scrollTo({ top: 0, behavior: 'smooth' });
        verificarPatente();
    }

    async function accionRegistrar() {
        const patente = document.getElementById("patenteNueva").value.toUpperCase().trim();
        if (!patente) return;
        const ahora = new Date();
        const hora = ahora.toLocaleTimeString('es-CL');
        const fecha = ahora.toLocaleDateString('es-CL');
        try {
            await db.collection("activos").doc(patente).set({
                patente, tipo: "Ticket por Minuto", hora, fecha, status: "Activo"
            });
            document.getElementById("registro-container").style.display = "none";
            await cargarPatentesCache();
            verificarPatente();
            document.getElementById("inputPatente").value = "";
        } catch (e) { alert("Error al guardar"); }
    }

    let patentesActivasCache = [];
    async function cargarPatentesCache() {
        try {
            const snapshot = await db.collection("activos").get();
            patentesActivasCache = snapshot.docs.map(doc => doc.id);
            console.log("Cache universal cargada: " + patentesActivasCache.length + " patentes.");
        } catch (e) {
            console.error("Error cargando cache:", e);
        }
    }
    cargarPatentesCache();

    // Autocomplete predictivo (recuperado de tu versión anterior)
    const input = document.getElementById("inputPatente");
    const listContainer = document.getElementById("autocomplete-list");
    input.addEventListener("input", function() {
        const val = this.value.toUpperCase().trim();
        listContainer.innerHTML = "";

        if (!val || val.length < 1) {
            listContainer.style.display = "none";
            return;
        }

        const sugerencias = patentesActivasCache.filter(p => p.includes(val)).slice(0, 8);
        if (sugerencias.length > 0) {
            sugerencias.forEach(p => {
                const b = document.createElement("DIV");
                const regex = new RegExp(`(${val})`, 'gi');
                b.innerHTML = p.replace(regex, "<strong>$1</strong>");
                b.innerHTML += "<input type='hidden' value='" + p + "'>";
                b.addEventListener("click", function() {
                    input.value = this.getElementsByTagName("input")[0].value;
                    listContainer.style.display = "none";
                    verificarPatente();
                });
                listContainer.appendChild(b);
            });
            listContainer.style.display = "block";
        } else {
            listContainer.style.display = "none";
        }
    });

    document.addEventListener("click", (e) => {
        if (e.target !== input) listContainer.style.display = "none";
    });
    </script>
</body>
</html>
