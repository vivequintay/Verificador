<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIVE QUINTAY SPA - VERIFICADOR</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0A2F4F">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <style>
        body {
            background-color: #0A2F4F;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0; padding: 20px; text-align: center;
            overflow-x: hidden;
        }
        h2 { color: #00E0D0; margin-bottom: 5px; letter-spacing: 2px; }
        .status { background: #0D3B5C; padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; }
        input[type="text"] {
            width: 100%; box-sizing: border-box; padding: 18px; font-size: 1.5rem;
            border-radius: 12px; border: 2px solid #00E0D0; text-align: center;
            text-transform: uppercase; background: #fdfdfd; color: #333;
        }
        button { width: 100%; padding: 18px; border: none; border-radius: 12px; font-weight: bold; font-size: 2.2rem; margin-top: 15px; cursor: pointer; }
        #verificar-manual { background: #2196F3; color: white; }
        #btn-total-pendientes { background: #FF9800; color: white; margin-top: 10px; font-size: 1.8rem; border: 2px solid #CC7A00; }
        .overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 9999; justify-content: center; align-items: center; flex-direction: column;
            opacity: 1;
        }
        #flash-pagado { background-color: #00C853; }
        #flash-pendiente { background-color: #FF9800; }
        #flash-frecuente { background-color: #42A5F5; }
        #flash-blacklist { background-color: #D32F2F; }
        .svg-icon {
            width: 180px; height: 180px; fill: white; margin-bottom: 20px;
            animation: bounceIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .card-pendiente {
            background: #0D3B5C; border-left: 5px solid #FF6B35; margin: 10px 0;
            padding: 15px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; cursor: pointer;
        }
        .txt-patente-lista { color: #00E0D0; font-size: 1.4rem; font-weight: bold; }
        .txt-hora-lista { color: #B0BEC5; font-size: 0.9rem; }
        .badge-pendiente { background: #FF6B35; color: white; padding: 5px 10px; border-radius: 6px; font-weight: bold; }
        hr { border: 0.5px solid #0D3B5C; margin: 30px 0; }
        .autocomplete-items {
            position: absolute;
            border: 2px solid #00E0D0;
            border-top: none;
            z-index: 99;
            top: 100%;
            left: 0;
            right: 0;
            background-color: #0D3B5C;
            border-radius: 0 0 12px 12px;
            max-height: 200px;
            overflow-y: auto;
        }
        .autocomplete-items div {
            padding: 15px;
            cursor: pointer;
            border-bottom: 1px solid #0A2F4F;
            font-size: 1.3rem;
            font-weight: bold;
            color: #00E0D0;
        }
        .autocomplete-items div:last-child { border-bottom: none; }
        .autocomplete-active { background-color: #0A2F4F !important; }
        .autocomplete-container { position: relative; width: 100%; }
        /* Tarjetas profesionales */
        .card-status {
            background: #0D3B5C;
            border-radius: 16px;
            padding: 25px 20px;
            margin: 30px auto;
            max-width: 90%;
            border: 4px solid;
            text-align: center;
            box-shadow: 0 8px 16px rgba(0,0,0,0.4);
        }
        .card-status h1 {
            margin: 0 0 15px 0;
            font-size: 2.8rem;
            font-weight: 900;
        }
        .card-status .subtitle {
            font-size: 1.5rem;
            margin: 5px 0;
            font-weight: bold;
        }
        .card-status .detail {
            font-size: 1.3rem;
            color: #B0BEC5;
            margin: 8px 0;
        }
        .card-pagado { border-color: #00C853; }
        .card-pendiente { border-color: #FF9800; }
        .card-frecuente { border-color: #42A5F5; }
        .card-blacklist { border-color: #D32F2F; }
    </style>
</head>
<body>
    <!-- Flashes -->
    <div id="flash-pagado" class="overlay">
        <svg class="svg-icon" viewBox="0 0 24 24">
            <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
        </svg>
        <h1 style="color: white; font-size: 4rem; font-weight: 900; margin: 0;">PAGADO</h1>
    </div>
    <div id="flash-pendiente" class="overlay">
        <svg class="svg-icon" viewBox="0 0 24 24">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
        </svg>
        <h1 style="color: white; font-size: 3.5rem; font-weight: 900; margin: 0;">PENDIENTE</h1>
    </div>
    <div id="flash-frecuente" class="overlay" style="background-color: #42A5F5;">
        <svg class="svg-icon" viewBox="0 0 24 24">
            <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
        </svg>
        <h1 style="color: white; font-size: 4rem; font-weight: 900; margin: 0;">FRECUENTE</h1>
        <p style="color: white; font-size: 1.8rem; margin-top: 10px; font-weight: bold;">Tope $4.000</p>
    </div>
    <div id="flash-blacklist" class="overlay" style="background-color: #D32F2F;">
        <svg class="svg-icon" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="10" fill="none" stroke="white" stroke-width="3"/>
            <line x1="6" y1="6" x2="18" y2="18" stroke="white" stroke-width="5" stroke-linecap="round"/>
        </svg>
        <h1 style="color: white; font-size: 3.5rem; font-weight: 900; margin: 0;">PATENTE EN LISTA NEGRA</h1>
        <p style="color: #FFCDD2; font-size: 1.6rem; margin-top: 15px;">Contactar Administración</p>
    </div>

    <div style="margin-bottom: 30px;">
        <h2>VIVE QUINTAY SPA</h2>
        <span class="status">VERIFICACIÓN DE PATENTES</span>
    </div>

    <div style="margin-bottom: 20px;">
        <div class="autocomplete-container" style="margin-bottom: 20px;">
            <input type="text" id="inputPatente" placeholder="BUSCAR PATENTE" autocomplete="off" />
            <div id="autocomplete-list" class="autocomplete-items" style="display:none;"></div>
        </div>
        <button id="verificar-manual" onclick="verificarPatente()">VERIFICAR</button>
        <button id="btn-total-pendientes" onclick="verTotalPendientes()">TOTAL PENDIENTES</button>
    </div>

    <hr>

    <div id="display-resultado"></div>
    <div id="lista-pendientes"></div>

    <div id="registro-container" style="display:none; background: #0D3B5C; padding: 25px; border-radius: 20px; border: 2px solid #FF6B35; margin-top: 20px;">
        <p style="margin: 0 0 15px 0; color: #FFB300; font-weight: bold;">NO REGISTRADO</p>
        <input type="text" id="patenteNueva" style="text-transform: uppercase; font-weight: bold;" />
        <button onclick="accionRegistrar()" style="background: #FF6B35; color: white;">REGISTRAR INGRESO POR MINUTO</button>
    </div>

    <script>
        const firebaseConfig = {
            projectId: "vive-quintay-spa",
            authDomain: "vive-quintay-spa.firebaseapp.com",
            storageBucket: "vive-quintay-spa.appspot.com",
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function lanzarFlash(elementoId) {
            const el = document.getElementById(elementoId);
            el.style.display = "flex";
            el.style.opacity = "1";
            setTimeout(() => {
                el.style.transition = "opacity 0.4s ease";
                el.style.opacity = "0";
                setTimeout(() => el.style.display = "none", 400);
            }, 1300);
        }

        function lanzarFlashBlacklist() {
            const el = document.getElementById("flash-blacklist");
            if (!el) return;
            el.style.display = "flex";
            el.style.opacity = "1";
            if ("vibrate" in navigator) navigator.vibrate([500, 200, 500]);
            setTimeout(() => {
                el.style.transition = "opacity 0.5s ease";
                el.style.opacity = "0";
                setTimeout(() => el.style.display = "none", 500);
            }, 2200);
        }

        async function verificarPatente() {
            const rawInput = document.getElementById("inputPatente").value.toUpperCase().trim();
            const patente = rawInput.replace(/-/g, "").replace(/\s+/g, "");
            const display = document.getElementById("display-resultado");
            const regContainer = document.getElementById("registro-container");
            const listaDiv = document.getElementById("lista-pendientes");

            listaDiv.innerHTML = "";
            display.innerHTML = "";
            regContainer.style.display = "none";

            if (!patente) {
                display.innerHTML = "<p style='color: #FFB300;'>Ingresa una patente</p>";
                return;
            }

            try {
                // 1. Lista Negra (prioridad máxima)
                const blacklistSnap = await db.collection("config").doc("blacklist").get();
                const blacklist = blacklistSnap.exists ? blacklistSnap.data().lista || [] : [];
                if (blacklist.includes(patente)) {
                    lanzarFlashBlacklist();
                    display.innerHTML = `
                        <div class="card-status card-blacklist">
                            <h1 style="color: #D32F2F;">PATENTE BLOQUEADA</h1>
                            <p style="color: #FFCDD2; font-size: 1.4rem;">
                                Nos reservamos el derecho de admisión conforme a la normativa vigente.<br>
                                <strong>Lo sentimos, pero no podemos permitir el ingreso en este momento.</strong><br><br>
                                Para más detalles consulte la guía de la 
                                <a href="https://www.bcn.cl/leyfacil/recurso/derecho-de-admision" 
                                   style="color:#BBDEFB; text-decoration:underline;" target="_blank">Biblioteca del Congreso</a>.
                            </p>
                            <p style="color: #B0BEC5; font-size: 1.2rem; margin-top: 20px;">
                                Contacte a Administración para aclaraciones.
                            </p>
                        </div>`;
                    return;
                }

                // 2. Frecuentes
                const frecuentesSnap = await db.collection("config").doc("frecuentes").get();
                const frecuentesLista = frecuentesSnap.exists ? frecuentesSnap.data().lista || [] : [];
                const esFrecuente = frecuentesLista.includes(patente);

                // 3. Activos
                const doc = await db.collection("activos").doc(patente).get();

                if (esFrecuente) {
                    lanzarFlash("flash-frecuente");
                    display.innerHTML = `
                        <div class="card-status card-frecuente">
                            <h1 style="color: #42A5F5;">FRECUENTE</h1>
                            <p class="subtitle">Tope $4.000</p>
                            <p class="detail">Patente: ${patente}</p>
                            <p class="detail">Ingreso: ${doc.exists ? (doc.data().hora || '--:--') : '--:--'}</p>
                        </div>`;
                    if (!doc.exists) regContainer.style.display = "block";
                    document.getElementById("patenteNueva").value = patente;
                    return;
                }

                if (doc.exists) {
                    const data = doc.data();
                    const status = data.status ? data.status.toLowerCase() : "activo";
                    if (status === "pagado" || status === "finalizado") {
                        lanzarFlash("flash-pagado");
                        display.innerHTML = `
                            <div class="card-status card-pagado">
                                <h1 style="color: #00C853;">PAGADO</h1>
                                <p class="detail">Patente: ${patente}</p>
                                <p class="detail">Hora Pago: ${data.hora_pago || '--:--'}</p>
                                <p style="color: #E8F5E9; font-weight: bold;">Puede salir del recinto.</p>
                            </div>`;
                    } else {
                        lanzarFlash("flash-pendiente");
                        display.innerHTML = `
                            <div class="card-status card-pendiente">
                                <h1 style="color: #FF9800;">PENDIENTE</h1>
                                <p class="detail">Patente: ${patente}</p>
                                <p class="detail">Ingreso: ${data.hora || '--:--'}</p>
                                <p style="color: #FFF3E0; font-weight: bold;">Debe regularizar pago en la caja.</p>
                            </div>`;
                    }
                } else {
                    display.innerHTML = `
                        <div class="card-status card-pendiente">
                            <h1 style="color: #D32F2F;">NO REGISTRADO</h1>
                            <p class="detail">Patente: ${patente}</p>
                            <p class="detail">No hay registro activo para hoy.</p>
                        </div>`;
                    regContainer.style.display = "block";
                    document.getElementById("patenteNueva").value = patente;
                }
            } catch (e) {
                console.error("Error en verificarPatente:", e);
                display.innerHTML = `<p style='color: #D32F2F;'>Error de conexión. Revisa internet o Firebase.<br>Detalles: ${e.message}</p>`;
            }
        }

        // Resto de funciones (verTotalPendientes, seleccionarPatente, accionRegistrar, cargarPatentesCache, autocomplete) se mantienen iguales
        // ... (pega aquí el resto de tu script sin cambios)
    </script>
</body>
</html>
